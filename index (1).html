<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffdeeb;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #container {
            text-align: center;
            width: 100%;
        }

        .gif-container img {
            width: 250px; /* Adjust size here */
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            padding: 0 20px;
        }

        .button-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            height: 60px; /* Fixed height since Yes doesn't grow anymore */
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s ease;
        }

        #yesButton {
            background-color: #4caf50;
            color: white;
        }

        #noButton {
            background-color: #f44336;
            color: white;
            position: relative;
            z-index: 1000;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="question-section">
            <div class="gif-container">
                <img id="main-gif" src="https://will-you-b-my-valentine.vercel.app/_next/image?url=%2Fplease.gif&w=384&q=75" alt="Asking GIF">
            </div>
            <h1 id="question">Will you be my Valentine?</h1>
            <div class="button-wrapper">
                <button id="yesButton">Yes</button>
                <button id="noButton">No</button>
            </div>
        </div>

        <div id="success-section" class="hidden">
            <div class="gif-container">
                <img src="https://will-you-b-my-valentine.vercel.app/_next/image?url=%2Fcelebrate.gif&w=640&q=75" alt="Success GIF">
            </div>
            <h1>Yay!!! YOU JUST MADE ME THE HAPPIEST BOY EVERR BABYYYYY❤️</h1>
        </div>
    </div>

    <script>
        const noButton = document.getElementById("noButton");
        const yesButton = document.getElementById("yesButton");
        const questionSection = document.getElementById("question-section");
        const successSection = document.getElementById("success-section");

        const messages = [
            "Wait what",
            "Are you sure?", 
            "Really sure??", 
            "Think again!", 
            "Last chance!", 
            "Surely not?", 
            "I WILL GET YOU COOKIES", 
            "PLEASEEEEE", 
            "WHYYYYYY", 
            "do u want me to die", 
            "oh", 
            "you are talking to sherazi's ghost", 
            "COME ON PLEASEEE", 
            "I WILL GET YOU TIRAMISU", 
            "WHAT ABOUT NOODLESS", 
            "You're breaking my heart ;("
        ];

        let messageIndex = 0;

        function moveButton() {
            // Make button move around
            noButton.style.position = "absolute";

            const x = Math.random() * (window.innerWidth - noButton.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noButton.offsetHeight - 40) + 20;

            noButton.style.left = `${x}px`;
            noButton.style.top = `${y}px`;

            // Update text from your custom list
            noButton.innerText = messages[messageIndex];
            messageIndex = (messageIndex + 1) % messages.length;
        }

        noButton.addEventListener("mouseover", moveButton);
        noButton.addEventListener("click", moveButton);

        yesButton.addEventListener("click", () => {
            questionSection.classList.add("hidden");
            successSection.classList.remove("hidden");
        });
    </script>
</body>
</html>
